<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenit Empire Elite</title>
    <style>
        :root { --n-blue: #00f2ff; --n-pink: #ff00d4; --bg: #05050a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        #top-bar { display: flex; justify-content: space-around; padding: 15px; background: #1a1a2e; border-bottom: 2px solid var(--n-pink); flex-shrink: 0; z-index: 100; }
        .balance-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--n-blue); text-align: center; }
        .balance-label { font-size: 0.6rem; text-transform: uppercase; color: #888; }

        /* CONTENEDOR DE PÁGINAS */
        #main-container { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; position: relative; }
        .page { display: none; width: 100%; }
        .page.active { display: block; }

        /* TITULOS */
        .section-title { border-left: 4px solid var(--n-blue); padding-left: 10px; font-size: 1.4rem; font-weight: bold; text-align: left; margin-bottom: 20px; text-transform: uppercase; }
        .pink-title { border-left-color: var(--n-pink); }

        /* MINA (BLOQUEADOS) */
        .cristal-img { width: 100px; filter: drop-shadow(0 0 15px var(--n-blue)); margin: 10px auto; display: block; }
        .counter-card { background: #10101a; border-radius: 15px; padding: 20px; border: 1px solid #222; text-align: center; margin-bottom: 20px; }
        .drones-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .drone-slot { aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .drone-slot.locked { filter: grayscale(1); opacity: 0.4; }
        .drone-slot.locked::after { content: '🔒'; position: absolute; bottom: 5px; right: 5px; font-size: 10px; }
        .drone-slot.active { border-color: var(--n-blue); filter: none; opacity: 1; }
        .drone-ico { width: 35px; }

        /* TIENDA (A COLOR) */
        .shop-card { background: #12121f; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #1a1a2e; gap: 12px; }
        .shop-img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px var(--n-pink)); }
        .shop-info { flex-grow: 1; }
        .shop-name { color: var(--n-pink); font-weight: bold; font-size: 0.9rem; }
        .buy-btn { background: var(--n-blue); color: #000; border: none; border-radius: 10px; padding: 10px 12px; font-weight: bold; min-width: 90px; cursor: pointer; }

        /* CARDS PARA BILLETERA Y MENÚ (RECUPERADAS) */
        .card { background: #10101a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .card-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .btn-full { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* NAVEGACIÓN */
        #nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a15; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #555; font-size: 0.7rem; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--n-blue); }
    </style>
</head>
<body>

<div id="top-bar">
    <div><span class="balance-val" id="b-plata">1,000.00</span><span class="balance-label">Plata</span></div>
    <div><span class="balance-val" id="b-oro">0.00</span><span class="balance-label">Oro</span></div>
</div>

<div id="main-container">
    
    <div id="p-mina" class="page active">
        <div class="section-title">MINA DE CRISTALES</div>
        <img src="cristal.png" class="cristal-img">
        <div class="counter-card">
            <span id="c-temp" style="font-size:2.2rem; font-weight:bold;">0.00</span>
        </div>
        <div class="drones-grid">
            <div class="drone-slot locked" id="slot-N1"><img src="dron.png" class="drone-ico"><small>N1</small></div>
            <div class="drone-slot locked" id="slot-N2"><img src="dron.png" class="drone-ico"><small>N2</small></div>
            <div class="drone-slot locked" id="slot-N3"><img src="dron.png" class="drone-ico"><small>N3</small></div>
        </div>
    </div>

    <div id="p-tienda" class="page">
        <div class="section-title pink-title">TIENDA</div>
        <div class="shop-card">
            <img src="dron.png" class="shop-img">
            <div class="shop-info"><span class="shop-name">Dron Nivel 1</span><br><small>Prod: 42/h</small></div>
            <button class="buy-btn" onclick="comprar(1000, 'N1', 0.012)">1,000 P</button>
        </div>
        </div>

    <div id="p-almacen" class="page">
        <div class="section-title">ALMACÉN</div>
        <div class="card" style="text-align:center;">
            <span class="card-label">Cristales en Stock</span>
            <span id="c-total" style="font-size:2rem; font-weight:bold">0.00</span>
        </div>
        <button class="btn-full" style="background:var(--n-blue)" onclick="recolectar()">RECOLECTAR</button>
        <button class="btn-full" style="background:var(--n-pink); color:white; margin-top:10px;" onclick="vender()">VENDER (70/30)</button>
    </div>

    <div id="p-pagos" class="page">
        <div class="section-title">BILLETERA</div>
        <div class="card">
            <span class="card-label" style="color:var(--n-blue)">Depósito USDT (BEP20)</span>
            <code style="display:block; background:#000; padding:10px; border-radius:5px; font-size:0.7rem; margin-bottom:10px;">0x7949563728929929292...</code>
            <button class="btn-full" style="background:#222; color:white" onclick="alert('Copiado')">COPIAR DIRECCIÓN</button>
        </div>
        <div class="card">
            <span class="card-label" style="color:var(--n-pink)">Retirar Saldo Oro</span>
            <input type="number" placeholder="Monto a retirar" style="width:95%; padding:12px; background:#000; color:white; border:1px solid #333; border-radius:8px;">
            <button class="btn-full" style="background:var(--n-pink); color:white">SOLICITAR RETIRO</button>
        </div>
    </div>

    <div id="p-menu" class="page">
        <div class="section-title pink-title">SISTEMA Y TAREAS</div>
        <div class="card">
            <span class="card-label">🎰 Ruleta Diaria</span>
            <button class="btn-full" style="background:var(--n-blue)" onclick="alert('Girando...')">GIRAR GRATIS</button>
        </div>
        <div class="card">
            <span class="card-label">📢 Tareas Sociales</span>
            <button class="btn-full" style="background:#0088cc; color:white">UNIRSE AL TELEGRAM (+100 P)</button>
        </div>
        <div class="card">
            <span class="card-label">👥 Invitaciones</span>
            <button class="btn-full" style="background:#333; color:white" onclick="alert('Link copiado')">COPIAR LINK DE REFERIDO</button>
        </div>
    </div>

</div>

<nav id="nav-bar">
    <div class="nav-item active" onclick="navegar('p-mina', this)">MINA</div>
    <div class="nav-item" onclick="navegar('p-tienda', this)">TIENDA</div>
    <div class="nav-item" onclick="navegar('p-almacen', this)">STOCK</div>
    <div class="nav-item" onclick="navegar('p-pagos', this)">PAGOS</div>
    <div class="nav-item" onclick="navegar('p-menu', this)">MENÚ</div>
</nav>

<script>
    let p = 1000, o = 0, ct = 0, cst = 0, prod = 0;

    setInterval(() => { 
        if(prod > 0) { 
            ct += prod; 
            document.getElementById('c-temp').innerText = ct.toFixed(2); 
        } 
    }, 1000);

    function navegar(id, el) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function comprar(costo, nivel, suma) {
        if(p >= costo) {
            p -= costo; prod += suma; 
            document.getElementById('b-plata').innerText = p.toFixed(2);
            let slot = document.getElementById('slot-' + nivel);
            if(slot) { slot.classList.remove('locked'); slot.classList.add('active'); }
            alert("¡Dron activado!");
        } else { alert("Saldo insuficiente"); }
    }

    function recolectar() { cst += ct; ct = 0; document.getElementById('c-total').innerText = cst.toFixed(2); document.getElementById('c-temp').innerText = "0.00"; }
    function vender() {
        if(cst < 100) return alert("Mínimo 100");
        p += (cst/100)*0.7; o += (cst/100)*0.3; cst = 0;
        document.getElementById('b-plata').innerText = p.toFixed(2);
        document.getElementById('b-oro').innerText = o.toFixed(2);
        document.getElementById('c-total').innerText = "0.00";
    }
</script>
</body>
    </html>
