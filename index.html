<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenit Empire Pro</title>
    <style>
        :root { --n-blue: #00f2ff; --n-pink: #ff00d4; --bg: #05050a; --card: #10101a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #top-bar { display: flex; justify-content: space-around; padding: 15px; background: #1a1a2e; border-bottom: 2px solid var(--n-pink); }
        .balance-val { display: block; font-size: 1.1rem; font-weight: bold; color: var(--n-blue); text-align: center; }
        .balance-label { font-size: 0.6rem; text-transform: uppercase; color: #888; }

        #main-container { flex-grow: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .info { flex-grow: 1; }
        .name { color: var(--n-pink); font-weight: bold; display: block; font-size: 0.9rem; }
        .stats { font-size: 0.75rem; color: #aaa; }
        .btn { background: var(--n-blue); border: none; color: black; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* RULETA MEJORADA */
        #ruleta-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .wheel-box { position: relative; width: 300px; height: 300px; }
        .wheel-img { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--n-pink); transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); background: conic-gradient(#ff00d4 0deg 45deg, #1a1a2e 45deg 90deg, #00f2ff 90deg 135deg, #1a1a2e 135deg 180deg, #ff00d4 180deg 225deg, #1a1a2e 225deg 270deg, #00f2ff 270deg 315deg, #1a1a2e 315deg 360deg); }
        .wheel-marker { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 10; color: white; }

        /* MINA DRONES ACTIVOS */
        .working-drones { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .mini-drone { width: 50px; text-align: center; font-size: 0.6rem; color: var(--n-blue); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        #nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a15; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #666; font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--n-blue); }
        .nav-icon { font-size: 1.5rem; display: block; }
    </style>
</head>
<body>

<div id="top-bar">
    <div><span class="balance-val" id="p-compra">1,000</span><span class="balance-label">Plata</span></div>
    <div><span class="balance-val" id="o-retiro">0.00</span><span class="balance-label">Oro</span></div>
</div>

<div id="main-container">
    <div id="tab-mina" class="page active">
        <h2 style="border-left: 4px solid var(--n-blue); padding-left:10px">MINA DE CRISTALES</h2>
        <div style="text-align:center;">
            <img src="cristal.png" style="width:150px; filter: drop-shadow(0 0 15px var(--n-blue));">
            <div class="card" style="margin-top:15px; justify-content:center; flex-direction:column">
                <span class="stats">CRISTALES GENERADOS</span>
                <span id="c-count" style="font-size:1.8rem; font-weight:bold">0.00</span>
            </div>
            
            <p class="name" style="font-size:0.7rem; margin-top:20px">DRONES TRABAJANDO</p>
            <div id="drones-area" class="working-drones">
                <div class="mini-drone">🛰️<br>Regalo</div>
            </div>
        </div>
    </div>

    <div id="tab-tienda" class="page">
        <h2>TIENDA</h2>
        <div class="card"><div class="info"><span class="name">Dron Nivel 2 ($3)</span><span class="stats">Prod: 221/h</span></div><button class="btn" onclick="buy(30000, 'Nivel 2')">30,000 P</button></div>
        <div class="card"><div class="info"><span class="name">Dron Nivel 4 ($12)</span><span class="stats">Prod: 6,091/h</span></div><button class="btn" onclick="buy(150000, 'Nivel 4')">150,000 P</button></div>
    </div>

    <div id="tab-menu" class="page">
        <h2>SISTEMA Y JUEGOS</h2>
        <div class="card" style="border: 2px solid var(--n-pink);">
            <div class="info"><span class="name">🎡 RULETA FORTUNA</span><span class="stats">1 boleto = 1 giro</span></div>
            <button class="btn" onclick="openWheel()" style="background:var(--n-pink); color:white">JUGAR</button>
        </div>
    </div>
</div>

<div id="ruleta-modal">
    <h2 style="color:var(--n-blue)">RULETA ZENIT</h2>
    <div class="wheel-box">
        <div class="wheel-marker">▼</div>
        <div id="wheel" class="wheel-img"></div>
    </div>
    <p id="wheel-msg" class="stats" style="margin-top:20px; font-size:1rem; color:var(--n-pink)">Tickets: 1</p>
    <button class="btn" id="spin-btn" onclick="spin()" style="width:220px; padding:15px; margin-bottom:10px">GIRAR AHORA</button>
    <button class="btn" onclick="closeWheel()" style="background:none; color:white">CERRAR</button>
</div>

<nav id="nav-bar">
    <div class="nav-item active" onclick="nav('tab-mina', this)"><span class="nav-icon">⛏️</span>Mina</div>
    <div class="nav-item" onclick="nav('tab-tienda', this)"><span class="nav-icon">🛒</span>Tienda</div>
    <div class="nav-item" onclick="nav('tab-menu', this)"><span class="nav-icon">🔳</span>Menú</div>
</nav>

<script>
    let tickets = 1;
    let balancePlata = 1000;

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function buy(price, name) {
        if(balancePlata >= price) {
            balancePlata -= price;
            document.getElementById('p-compra').innerText = balancePlata;
            const area = document.getElementById('drones-area');
            area.innerHTML += `<div class="mini-drone">🛰️<br>${name}</div>`;
            alert("¡Dron comprado y puesto a trabajar!");
        } else { alert("Plata insuficiente"); }
    }

    function openWheel() { document.getElementById('ruleta-modal').style.display = 'flex'; }
    function closeWheel() { document.getElementById('ruleta-modal').style.display = 'none'; }

    function spin() {
        if(tickets <= 0) return alert("Sin tickets");
        tickets--;
        document.getElementById('wheel-msg').innerText = "Tickets: " + tickets;
        const wheel = document.getElementById('wheel');
        const degrees = Math.floor(Math.random() * 360) + 1800; 
        wheel.style.transform = `rotate(${degrees}deg)`;
        
        setTimeout(() => {
            const premios = ["500 Plata", "10 Oro", "200 Plata", "Ticket Extra", "50 Oro", "100 Plata", "Sigue intentando", "Bono x2"];
            const randomP = premios[Math.floor(Math.random() * premios.length)];
            alert("¡FELICIDADES! Ganaste: " + randomP);
        }, 4000);
    }
</script>
</body>
</html>
